services:
    redis:
        image: redis:alpine
        container_name: redis
        ports:
            - '${REDIS_PORT}:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 30s
            retries: 3
            start_period: 20s
            timeout: 5s
        networks:
            - cloud-canvas-network
        logging:
            driver: 'fluentd'
            options:
                fluentd-address: 'localhost:24224'
                tag: 'redis'

    mysql:
        image: mysql:8.0
        container_name: mysql
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_USER_PASSWORD}
        ports:
            - '${MYSQL_PORT}:3306'
        volumes:
            - ../../config/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
            - ../../config/mysql/log.cnf:/etc/mysql/conf.d/log.cnf:ro
            - /var/log/mysql:/var/log/mysql
        healthcheck:
            test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u ping_user']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        networks:
            - cloud-canvas-network
        restart: unless-stopped
        logging:
            driver: 'fluentd'
            options:
                fluentd-address: 'localhost:24224'
                tag: 'redis'
networks:
    cloud-canvas-network:
        driver: bridge
